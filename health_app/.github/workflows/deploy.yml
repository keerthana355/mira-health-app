name: CI/CD Pipeline – MIRA Health App

# Trigger: runs every time you push to the main branch
on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Test the Backend (Django)
  # ─────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install all Python dependencies
      - name: Install dependencies
        working-directory: health_app/backend
        run: pip install -r requirements.txt

      # Step 4: Check Django config is valid (no code errors)
      - name: Run Django system check
        working-directory: health_app/backend
        env:
          DB_NAME: test_db
          DB_USER: root
          DB_PASSWORD: ''
          DB_HOST: localhost
          DB_PORT: '3306'
          GROQ_API_KEY: dummy-key-for-checks
        run: python manage.py check

  # ─────────────────────────────────────────
  # JOB 2: Test the Frontend (React + Vite)
  # ─────────────────────────────────────────
  test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install npm packages
      - name: Install dependencies
        working-directory: health_app/frontend
        run: npm install

      # Step 4: Build the React app (catches any build errors)
      - name: Build frontend
        working-directory: health_app/frontend
        env:
          VITE_API_BASE: https://mira-backend-6bl5.onrender.com/api
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: Deploy (only runs if both tests pass)
  # Vercel and Render auto-deploy from GitHub,
  # so this job just confirms deployment is triggered
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Only runs if both jobs above pass

    steps:
      - name: Deployment triggered
        run: |
          echo "✅ All checks passed!"
          echo "🚀 Vercel is auto-deploying the frontend..."
          echo "🚀 Render is auto-deploying the backend..."
          echo "🌐 Frontend: https://mira-health-app-olive.vercel.app"
          echo "🌐 Backend:  https://mira-backend-6bl5.onrender.com/api/patients/"
